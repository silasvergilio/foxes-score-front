<app-loader></app-loader>

<mat-toolbar class="app-toolbar">
  <button (click)="drawer.toggle()" mat-icon-button aria-label="Abrir menu">
    <mat-icon>menu</mat-icon>
  </button>
  <img src="logo-title.png" alt="Foxes" class="logo-title-img" />

  <!-- Edition switcher. Pill-style trigger to match the site's badge
       language; hidden until at least 2 editions are published. -->
  <button
    *ngIf="editions.length > 1"
    class="edition-pill"
    [matMenuTriggerFor]="editionMenu"
    type="button"
    aria-label="Trocar edição"
  >
    <span class="edition-pill-division">D{{ current.division }}</span>
    <span class="edition-pill-year">{{ current.year }}</span>
    <mat-icon class="edition-pill-chevron">expand_more</mat-icon>
  </button>

  <mat-menu #editionMenu="matMenu" xPosition="before" class="edition-menu">
    <button
      *ngFor="let e of editions"
      mat-menu-item
      class="edition-menu-item"
      [class.active]="sameEdition(e, current)"
      (click)="selectEdition(e)"
    >
      <span class="edition-menu-pill">D{{ e.division }}</span>
      <span class="edition-menu-year">{{ e.year }}</span>
      <mat-icon *ngIf="sameEdition(e, current)" class="edition-menu-check">check</mat-icon>
    </button>
  </mat-menu>

  <span class="spacer"></span>
  <img src="logo-title-cbbsbr.png" alt="CBBSBR" class="logo-title-img" />
</mat-toolbar>

<mat-drawer-container class="container">
  <mat-drawer class="drawer" #drawer [mode]="'over'">

    <button (click)="navigate('/teams')" class="menu-button" mat-button>
      <mat-icon fontIcon="groups_3"></mat-icon>Equipes Participantes
    </button>
    <button (click)="navigate('/game-results')" class="menu-button" mat-button>
      <mat-icon fontIcon="sports_baseball"></mat-icon>Jogos e Resultados
    </button>
    <button (click)="navigate('/stats')" class="menu-button" mat-button>
      <mat-icon fontIcon="analytics"></mat-icon>Estatísticas
    </button>
    <button (click)="navigate('/game-schedule')" class="menu-button" mat-button>
      <mat-icon fontIcon="table"></mat-icon>Tabela de Jogos
    </button>
    <button (click)="navigate('/standings')" class="menu-button" mat-button>
      <mat-icon fontIcon="leaderboard"></mat-icon>Classificação
    </button>
    <button (click)="navigate('/bracket')" class="menu-button" mat-button>
      <mat-icon fontIcon="military_tech"></mat-icon>Eliminatórias
    </button>
    <button (click)="navigate('/awards')" class="menu-button" mat-button>
      <mat-icon fontIcon="emoji_events"></mat-icon>Premiações
    </button>
    <button (click)="navigate('/game-view')" class="menu-button" mat-button>
      <mat-icon fontIcon="folder_shared"></mat-icon>Documentos Oficiais
    </button>

  </mat-drawer>

  <mat-drawer-content>
    <router-outlet></router-outlet>
  </mat-drawer-content>
</mat-drawer-container>
