<div class="results-page">

  <!-- Page Header -->
  <div class="page-hero">
    <div class="hero-content">
      <div class="hero-badge">
        <mat-icon>sports_baseball</mat-icon>
        <span>Taça Brasil Amador</span>
      </div>
      <h1 class="hero-title">Jogos e Resultados</h1>
    </div>
  </div>

  <!-- One scoreboard card per field -->
  <div class="scoreboards-section">
    <div class="scoreboard-card" *ngFor="let field of fields">

      <!-- Card Header -->
      <div class="card-header">
        <div class="field-info">
          <mat-icon class="field-icon">stadium</mat-icon>
          <div>
            <span class="field-label">Campo</span>
            <h2 class="field-name">{{ field.fieldName }}</h2>
          </div>
        </div>
        <div class="header-right">
          <span class="status-badge" [class]="field.status">{{ statusLabel(field.status) }}</span>
          <a *ngIf="field.broadcastUrl" class="transmission-button" [href]="field.broadcastUrl" target="_blank">
            <mat-icon>radio_button_checked</mat-icon>
            Transmissão
          </a>
        </div>
      </div>

      <!-- Scoreboard Table -->
      <div class="scoreboard-area">
        <div class="scoreboard-table">

          <!-- Header row -->
          <div class="scoreboard-row header-row">
            <div class="team-col header-cell">Equipe</div>
            <div class="inning-col header-cell" *ngFor="let inning of innings">{{ inning }}</div>
            <div class="runs-col header-cell highlight-col">R</div>
          </div>

          <!-- Team rows -->
          <div class="scoreboard-row" *ngFor="let team of field.teams; let last = last" [class.last-row]="last">
            <div class="team-col team-name-cell">{{ team.teamName | formatName }}</div>
            <div class="inning-col score-cell" *ngFor="let s of team.score">{{ s }}</div>
            <div class="runs-col score-cell highlight-col runs-total">{{ getRuns(team.score) }}</div>
          </div>

        </div>
      </div>

    </div>
  </div>

</div>
